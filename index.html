<!DOCTYPE html>
<html>
<head>
    <title>Student Form</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #89f7fe, #66a6ff);
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .form-box {
            background: white;
            padding: 20px;
            width: 350px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            color: #333;
        }

        label {
            font-size: 14px;
            margin-top: 10px;
            display: block;
        }

        input, select, textarea {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        .gender {
            display: flex;
            gap: 10px;
            margin-top: 5px;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 15px;
            background: #66a6ff;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #4d8ef0;
        }
    </style>
</head>

<body>

<div class="form-box">
    <h2>Student Form</h2>

    <form>
        <label>Full Name</label>
        <input type="text" required>

        <label>Email</label>
        <input type="email" required>

        <label>Password</label>
        <input type="password" required>

        <label>Gender</label>
        <div class="gender">
            <label><input type="radio" name="g"> Male</label>
            <label><input type="radio" name="g"> Female</label>
        </div>

        <label>Course</label>
        <select>
            <option>B.Tech CSE</option>
            <option>BCA</option>
            <option>BBA</option>
        </select>

        <label>Address</label>
        <textarea rows="3"></textarea>

        <button type="submit">Submit</button>
    </form>
</div>

</body>
</html>
